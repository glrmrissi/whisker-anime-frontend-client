<app-header></app-header>

<section class="favorites-wrapper">
  <div class="title-wrapper">
    <fa-icon [icon]="faHeart"></fa-icon>
    <h2>My Favorites</h2>
  </div>

  @if (isLoading()) {
    <div class="state-box">
      <p>Loading your favorites...</p>
    </div>
  } @else if (items().length === 0) {
    <div class="state-box empty">
      <fa-icon [icon]="faHeart" class="empty-icon"></fa-icon>
      <p>You haven't added any favorites yet.</p>
      <a routerLink="/home" class="discover-btn">
        <fa-icon [icon]="faCompass"></fa-icon>
        Discover Animes
      </a>
    </div>
  } @else {
    <app-favorites-grid [items]="items()"></app-favorites-grid>
  }
</section>
